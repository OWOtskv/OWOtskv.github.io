<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
    darkMode: 'class',
    theme: {
        extend: {
            fontFamily: { sans: ['"SF Pro Display"', '"SF Pro"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'] },
            animation: {
                'fade-in': 'fadeIn 0.3s ease-out',
                'slide-up': 'slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
                'shimmer': 'shimmer 2.5s ease-in-out infinite',
            },
            keyframes: {
                fadeIn: { '0%': { opacity: '0', transform: 'translateY(6px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                slideUp: { '0%': { opacity: '0', transform: 'translateY(16px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
            }
        }
    }
}
</script>
<style>
:root {
    --blur-intensity: 20px;
    --glass-bg: rgba(18, 18, 20, 0.38);
    --glass-bg-hover: rgba(28, 28, 32, 0.48);
    --glass-bg-active: rgba(40, 40, 48, 0.55);
    --glass-border: rgba(255, 255, 255, 0.12);
    --glass-border-hover: rgba(255, 255, 255, 0.18);
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.3);
    --shimmer-speed: 2.5s;
}

*, *::before, *::after { box-sizing: border-box; }
body {
    font-family: '"SF Pro Display"', '"SF Pro"', -apple-system, BlinkMacSystemFont, '"Segoe UI"', sans-serif;
    background: #06080d;
    color: #e4e4e7;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
    height: 100vh;
}

/* ========== WebGL Shader Background Canvas (replaces old particle system) ========== */
#shaderCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    width: 100%;
    height: 100%;
}

/* ========== Vignette Overlay (above shader, below UI) ========== */
#vignetteOverlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(4, 6, 12, 0.55) 85%, rgba(2, 3, 6, 0.8) 100%);
}

/* ========== Glassmorphism ========== */
.glass {
    background: var(--glass-bg);
    backdrop-filter: blur(var(--blur-intensity));
    -webkit-backdrop-filter: blur(var(--blur-intensity));
    border: 1px solid var(--glass-border);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
}
.glass-hover:hover {
    background: var(--glass-bg-hover);
    border-color: var(--glass-border-hover);
}
.glass-active {
    background: var(--glass-bg-active);
    border-color: rgba(255, 255, 255, 0.12);
}

/* ========== Shimmer Effect ========== */
.shimmer-enabled .shimmer-card {
    position: relative;
    overflow: hidden;
}
.shimmer-enabled .shimmer-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.025) 45%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.025) 55%, transparent 65%);
    background-size: 200% 100%;
    animation: shimmer var(--shimmer-speed) ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
}
.shimmer-enabled .shimmer-card:hover::after {
    animation-duration: 1.2s;
}

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

/* ========== Sidebar active indicator ========== */
.sidebar-item {
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    border-left: 2px solid transparent;
}
.sidebar-item.active {
    border-left-color: var(--accent);
    background: rgba(99, 102, 241, 0.08);
}
.sidebar-item:hover:not(.active) {
    background: rgba(255, 255, 255, 0.03);
}

/* ========== Card transitions ========== */
.tag-card {
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    user-select: none;
}
.tag-card:hover { transform: translateY(-2px); }
.tag-card:active { transform: scale(0.96); }

.char-card-music {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    user-select: none;
}
.char-card-music:hover { transform: translateY(-4px); }
.char-card-music:active { transform: scale(0.97); }

/* ========== Selected chip ========== */
.selected-chip-v10 {
    animation: fadeIn 0.25s ease-out;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.selected-chip-v10:hover { transform: translateY(-1px); }

/* ========== Copy pulse ========== */
@keyframes copyPulseV10 {
    0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.5); }
    50% { box-shadow: 0 0 0 16px rgba(99, 102, 241, 0); }
}
.copy-pulse-v10 { animation: copyPulseV10 0.7s ease-out; }

/* ========== Range slider styling ========== */
input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    outline: none;
}
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #6366f1;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
}

/* ========== Settings Modal ========== */
.settings-modal {
    transition: opacity 0.3s ease, visibility 0.3s ease;
}

/* ========== Section title ========== */
.section-title {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #e4e4e7;
}
</style>
</head>

<!-- ==================== JavaScript ==================== -->
<script>
(function() {
    'use strict';

    // ================================================================
    // CHANGE 1: WebGL Shader Background (replaces old 2D particle system)
    //   - Full-screen WebGL canvas with noise-based rotation + sine wave
    //   - warping + layered color mixing (yellow/blue + red/blue).
    //   - Properly resizes with window, runs in rAF loop, pointer-events disabled.
    // ================================================================

    var shaderCanvas = document.getElementById('shaderCanvas');
    var gl = shaderCanvas.getContext('webgl') || shaderCanvas.getContext('experimental-webgl');

    if (gl) {
        var vertexShaderSource = [
            'attribute vec2 a_position;',
            'void main() {',
            '  gl_Position = vec4(a_position, 0.0, 1.0);',
            '}'
        ].join('\n');

        var fragmentShaderSource = [
            'precision mediump float;',
            '#define S(a,b,t) smoothstep(a,b,t)',
            'mat2 Rot(float a) {',
            '  float s = sin(a);',
            '  float c = cos(a);',
            '  return mat2(c, -s, s, c);',
            '}',
            'vec2 hash(vec2 p) {',
            '  p = vec2(dot(p,vec2(2127.1,81.17)), dot(p,vec2(1269.5,283.37)));',
            '  return fract(sin(p)*43758.5453);',
            '}',
            'float noise(in vec2 p) {',
            '  vec2 i = floor(p);',
            '  vec2 f = fract(p);',
            '  vec2 u = f*f*(3.0-2.0*f);',
            '  float n = mix(mix(dot(-1.0+2.0*hash(i+vec2(0.0,0.0)), f-vec2(0.0,0.0)),',
            '                     dot(-1.0+2.0*hash(i+vec2(1.0,0.0)), f-vec2(1.0,0.0)), u.x),',
            '               mix(dot(-1.0+2.0*hash(i+vec2(0.0,1.0)), f-vec2(0.0,1.0)),',
            '                     dot(-1.0+2.0*hash(i+vec2(1.0,1.0)), f-vec2(1.0,1.0)), u.x), u.y);',
            '  return 0.5 + 0.5*n;',
            '}',
            'uniform vec2 u_resolution;',
            'uniform float u_time;',
            'void mainImage(out vec4 fragColor, in vec2 fragCoord) {',
            '  vec2 uv = fragCoord/u_resolution.xy;',
            '  float ratio = u_resolution.x / u_resolution.y;',
            '  vec2 tuv = uv;',
            '  tuv -= .5;',
            '  float degree = noise(vec2(u_time*.1, tuv.x*tuv.y));',
            '  tuv.y *= 1./ratio;',
            '  tuv *= Rot(radians((degree-.5)*720.+180.));',
            '  tuv.y *= ratio;',
            '  float frequency = 5.;',
            '  float amplitude = 30.;',
            '  float speed = u_time * 2.;',
            '  tuv.x += sin(tuv.y*frequency+speed)/amplitude;',
            '  tuv.y += sin(tuv.x*frequency*1.5+speed)/(amplitude*.5);',
            '  vec3 colorYellow = vec3(0.18, 0.10, 0.22);',
            '  vec3 colorDeepBlue = vec3(0.06, 0.09, 0.22);',
            '  vec3 layer1 = mix(colorYellow, colorDeepBlue, S(-.3, .2, (tuv*Rot(radians(-5.))).x));',
            '  vec3 colorRed = vec3(0.18, 0.10, 0.22);',
            '  vec3 colorBlue = vec3(0.12, 0.25, 0.38);',
            '  vec3 layer2 = mix(colorRed, colorBlue, S(-.3, .2, (tuv*Rot(radians(-5.))).x));',
            '  vec3 finalComp = mix(layer1, layer2, S(.5, -.3, tuv.y));',
            '  fragColor = vec4(finalComp, 1.0);',
            '}',
            'void main() {',
            '  vec2 fragCoord = gl_FragCoord.xy;',
            '  vec4 color;',
            '  mainImage(color, fragCoord);',
            '  gl_FragColor = color;',
            '}'

        var all = getAllSelectedGroups(), total = all.length, totalTexts = getTotalTexts();
        dom.groupCountBadge.textContent = total + ' ' + t('badge_groups');
        dom.sidebarTotalBadge.textContent = total + ' 组已选';

        if (total === 0) {
            dom.clearAllBtn.classList.add('hidden'); dom.emptyHintRight.classList.remove('hidden');
            dom.selectedGroupsContainer.innerHTML = ''; dom.selectedGroupsContainer.appendChild(dom.emptyHintRight);
        } else {
            dom.clearAllBtn.classList.remove('hidden'); dom.emptyHintRight.classList.add('hidden');
            var html = '';
            for (var i = 0; i < all.length; i++) {
                var g = all[i], color = categoryMeta[g.category].color, cls = chipCls[color], gName = getGroupName(g);
                html += '<span class="selected-chip-v10 inline-flex items-center gap-2 px-3 py-1.5 rounded-xl text-xs font-semibold border ' + cls + '">' + gName +
                    '<span class="text-[10px] font-normal opacity-50">(' + g.texts.length + ')</span>' +
                    '<button class="remove-chip-btn-v10 w-4 h-4 rounded-full flex items-center justify-center hover:bg-red-500/20 hover:text-red-400 transition-colors text-zinc-500 flex-shrink-0 text-[10px]" data-cat="' + g.category + '" data-id="' + g.id + '" title="Remove">✕</button></span>';
            }
            dom.selectedGroupsContainer.innerHTML = html;
            dom.selectedGroupsContainer.appendChild(dom.emptyHintRight);
        }
    }

    function composePrompt(shuffleAll) {
        var allGroups = getAllSelectedGroups();
        if (allGroups.length === 0) return '';
        var allTexts = [];
        for (var i = 0; i < allGroups.length; i++) { allTexts = allTexts.concat(allGroups[i].texts); }
        if (shuffleAll) allTexts = shuffle(allTexts);
        var prompt = allTexts.join(', ');
        if (state.mode === 'anima') prompt = t('animaPrefix') + prompt;
        return prompt;
    }

    function renderPrompt(shuffleAll, forceOverwrite) {
        var prompt = composePrompt(!!shuffleAll);
        lastAutoPrompt = prompt;
        if (forceOverwrite || !promptIsCustom || dom.promptOutput.value.trim() === '') {
            dom.promptOutput.value = prompt;
            promptIsCustom = false;
        }
        dom.charCount.textContent = dom.promptOutput.value.length + ' ' + t('badge_chars');
        updateRegenBtn();
    }

    function updateRegenBtn() {
        if (!dom.regenPromptBtn) return;
        if (promptIsCustom && dom.promptOutput.value.trim() !== '') {
            dom.regenPromptBtn.classList.remove('hidden');
        } else {
            dom.regenPromptBtn.classList.add('hidden');
        }
    }

    // ================================================================
    // CHANGE 2: Selective / targeted DOM updates
    //   Instead of calling the heavy refreshUI() → renderMainContent()
    //   on every selection toggle, we now patch only the affected
    //   elements directly. Full re-renders are reserved for structural
    //   changes: initial load, NSFW toggle, language switch, search.
    // ================================================================

    /**
     * Update a single card's visual selection state in-place.
     * @param {string} cat - Category key (e.g. 'quality', 'character')
     * @param {number} id  - Group id within that category
     */
    function patchCardVisual(cat, id) {
        var card = document.querySelector('[data-cat="' + cat + '"][data-id="' + id + '"]');
        if (!card) return;
        var isSel = state.selectedGroups[cat] && state.selectedGroups[cat].has(id);
        var meta = categoryMeta[cat];
        var color = meta.color;

        if (cat === 'character') {
            // Character cards: toggle ring + shadow + checkmark overlay
            if (isSel) {
                card.classList.add('ring-2', 'ring-purple-500/50', 'shadow-lg', 'shadow-purple-500/15');
                var inner = card.querySelector('div[class*="aspect-"]');
                if (inner && !inner.querySelector('.checkmark-overlay-v10')) {
                    var check = document.createElement('div');
                    check.className = 'checkmark-overlay-v10 absolute top-2.5 right-2.5 w-6 h-6 rounded-full bg-purple-500 flex items-center justify-center text-white text-xs font-bold shadow-lg z-10';
                    check.textContent = '✓';
                    inner.appendChild(check);
                }
            } else {
                card.classList.remove('ring-2', 'ring-purple-500/50', 'shadow-lg', 'shadow-purple-500/15');
                var checkmark = card.querySelector('.checkmark-overlay-v10');
                if (checkmark) checkmark.remove();
            }
        } else {
            // Tag cards: swap between selected and unselected class sets
            var unselArr = tagUnselectedCls[color].split(/\s+/);
            var selArr = tagSelectedCls[color].split(/\s+/);
            var removeSet = isSel ? unselArr : selArr;
            var addSet = isSel ? selArr : unselArr;
            for (var i = 0; i < removeSet.length; i++) { card.classList.remove(removeSet[i]); }
            for (var j = 0; j < addSet.length; j++) { card.classList.add(addSet[j]); }
        }
    }

    /**
     * Update sidebar badge counts in-place (no innerHTML rebuild).
     */
    function patchSidebarBadges() {
        var total = 0;
        var order = state.nsfwEnabled ? ALL_ORDER : SAFE_ORDER;
        for (var i = 0; i < order.length; i++) {
            var cat = order[i];
            var count = state.selectedGroups[cat] ? state.selectedGroups[cat].size : 0;
            total += count;
            var item = document.querySelector('[data-sidebar-cat="' + cat + '"]');
            if (!item) continue;
            var badge = item.querySelector('.sidebar-badge-v10');
            if (count > 0) {
                if (badge) {
                    badge.textContent = count;
                } else {
                    badge = document.createElement('span');
                    badge.className = 'sidebar-badge-v10 text-[11px] text-zinc-500 bg-white/5 px-1.5 py-0.5 rounded-full min-w-[20px] text-center';
                    badge.textContent = count;
                    item.appendChild(badge);
                }
            } else {
                if (badge) badge.remove();
            }
        }
        dom.sidebarTotalBadge.textContent = total + ' 组已选';
    }

    /**
     * Lightweight refresh: updates right panel, prompt, sidebar badges, and
     * persistence — without touching the main content or sidebar structure.
     */
    function lightRefresh() {
        renderSelectedGroups();
        renderPrompt(state.shuffled);
        patchSidebarBadges();
        saveState();
    }

    // ==================== Full Refresh (for structural changes) ====================
    /**
     * Full DOM rebuild. Use only for: initial load, NSFW toggle, language switch,
     * search clearing, and sidebar-category navigation.
     */
    function refreshUI() {
        renderSidebar();
        renderMainContent();
        renderSelectedGroups();
        renderPrompt(state.shuffled);
        updateStaticTexts();
        updateModeUI();
        updateLangButtons();
        updateNsfwButton();
        applySettings();
        var currentSearch = dom.searchInput.value.trim();
        if (currentSearch) performSearch(currentSearch);
        saveState();
    }

    function updateStaticTexts() {
        dom.promptOutput.placeholder = t('hint_emptyPrompt');
        dom.emptyHintRight.textContent = t('hint_emptyRight');
        dom.searchInput.placeholder = t('search_placeholder');
        dom.settingsTitle.textContent = t('settings_title');
        dom.settingsBlurLabel.textContent = t('settings_blur');
        dom.settingsShimmerLabel.textContent = t('settings_shimmer');
        dom.settingsShimmerHint.textContent = t('settings_shimmerHint');
        var labelIds = ['label_selectedGroups','label_prompt','label_clearAll','label_copy','label_shuffle','label_nsfw'];
        for (var i = 0; i < labelIds.length; i++) { var el = document.getElementById(labelIds[i]); if(el) el.textContent = t(labelIds[i]); }
        updateNsfwButton();
    }

    function updateModeUI() {
        var sdBtn = document.querySelector('.mode-option[data-mode="sd"]'), animaBtn = document.querySelector('.mode-option[data-mode="anima"]');
        if (state.mode === 'sd') {
            if(sdBtn){sdBtn.classList.add('bg-indigo-500','text-white');sdBtn.classList.remove('text-zinc-400');}
            if(animaBtn){animaBtn.classList.remove('bg-indigo-500','text-white');animaBtn.classList.add('text-zinc-400');}
        } else {
            if(sdBtn){sdBtn.classList.remove('bg-indigo-500','text-white');sdBtn.classList.add('text-zinc-400');}
            if(animaBtn){animaBtn.classList.add('bg-indigo-500','text-white');animaBtn.classList.remove('text-zinc-400');}
        }
    }

    function updateLangButtons() {
        var btns = $$('.lang-btn');
        btns.forEach(function(btn) {
            if (btn.dataset.lang === state.lang) { btn.classList.add('bg-indigo-500','text-white'); btn.classList.remove('text-zinc-400'); }
            else { btn.classList.remove('bg-indigo-500','text-white'); btn.classList.add('text-zinc-400'); }
        });
    }

    // ==================== NSFW ====================
    function updateNsfwButton() {
        var btn = dom.nsfwBtn, label = $('#label_nsfw');
        if (state.nsfwEnabled) {
            btn.className = 'px-3 py-2 rounded-xl text-xs font-semibold transition-all duration-200 glass border-red-500/30 bg-red-500/10 text-red-300 hover:bg-red-500/20';
            if(label) label.textContent = t('label_nsfwOn');
        } else {
            btn.className = 'px-3 py-2 rounded-xl text-xs font-semibold transition-all duration-200 glass text-zinc-400 hover:text-zinc-200 border-white/5';
            if(label) label.textContent = t('label_nsfw');
        }
    }

    function openNsfwModal() {
        dom.nsfwModalTitle.textContent = '🔞 ' + t('nsfw_modal_title');
        $('#nsfwClause1').textContent = t('nsfw_clause1'); $('#nsfwClause2').textContent = t('nsfw_clause2');
        $('#nsfwClause3').textContent = t('nsfw_clause3'); $('#nsfwClause4').textContent = t('nsfw_clause4');
        $('#nsfwClause5').textContent = t('nsfw_clause5');
        dom.nsfwModalCancel.textContent = t('nsfw_modal_cancel'); dom.nsfwModalConfirm.textContent = t('nsfw_modal_confirm');
        dom.nsfwModal.classList.remove('opacity-0','invisible');
    }

    function closeNsfwModal() { dom.nsfwModal.classList.add('opacity-0','invisible'); }

    function confirmNsfw() { state.nsfwEnabled = true; closeNsfwModal(); refreshUI(); }

    function handleNsfwToggle() {
    if (state.nsfwEnabled) {
        // ========== 关键修复：关闭 NSFW 前清除所有 NSFW 分组的选中项 ==========
        const nsfwCategories = ['nsfwClothing', 'nsfwActionTag', 'nsfwActionNatural'];
        for (let cat of nsfwCategories) {
            if (state.selectedGroups[cat]) {
                state.selectedGroups[cat].clear();
            }
        }
        // =================================================================
        state.nsfwEnabled = false;
        refreshUI();
    } else {
        openNsfwModal();
    }
}

    // ==================== Interaction Logic (with targeted updates) ====================
    function toggleGroup(cat, id) {
        var s = state.selectedGroups[cat]; if (!s) return;
        var deselectedIds = []; // {cat, id} pairs for cards that need unselect patching

        if (s.has(id)) {
            s.delete(id);
        } else {
            // Mutual exclusion: actionTag ↔ actionNatural
            if (cat === 'actionTag' && state.selectedGroups.actionNatural.size > 0) {
                var cleared = Array.from(state.selectedGroups.actionNatural);
                for (var i = 0; i < cleared.length; i++) { deselectedIds.push({cat:'actionNatural', id:cleared[i]}); }
                state.selectedGroups.actionNatural.clear();
            } else if (cat === 'actionNatural' && state.selectedGroups.actionTag.size > 0) {
                var cleared2 = Array.from(state.selectedGroups.actionTag);
                for (var j = 0; j < cleared2.length; j++) { deselectedIds.push({cat:'actionTag', id:cleared2[j]}); }
                state.selectedGroups.actionTag.clear();
            }
            // Mutual exclusion: nsfwActionTag ↔ nsfwActionNatural
            if (cat === 'nsfwActionTag' && state.selectedGroups.nsfwActionNatural && state.selectedGroups.nsfwActionNatural.size > 0) {
                var cleared3 = Array.from(state.selectedGroups.nsfwActionNatural);
                for (var k = 0; k < cleared3.length; k++) { deselectedIds.push({cat:'nsfwActionNatural', id:cleared3[k]}); }
                state.selectedGroups.nsfwActionNatural.clear();
            } else if (cat === 'nsfwActionNatural' && state.selectedGroups.nsfwActionTag && state.selectedGroups.nsfwActionTag.size > 0) {
                var cleared4 = Array.from(state.selectedGroups.nsfwActionTag);
                for (var m = 0; m < cleared4.length; m++) { deselectedIds.push({cat:'nsfwActionTag', id:cleared4[m]}); }
                state.selectedGroups.nsfwActionTag.clear();
            }
            s.add(id);
        }
        state.shuffled = false;

        // Targeted DOM updates — no full re-render
        // 1. Update mutually deselected cards (must happen after Set changes)
        for (var n = 0; n < deselectedIds.length; n++) {
            patchCardVisual(deselectedIds[n].cat, deselectedIds[n].id);
        }
        // 2. Update the clicked card
        patchCardVisual(cat, id);
        // 3. Light refresh for right panel, prompt, sidebar badges, persistence
        lightRefresh();
    }

    function removeGroup(cat, id) {
        if (state.selectedGroups[cat]) state.selectedGroups[cat].delete(id);
        state.shuffled = false;
        patchCardVisual(cat, id);
        lightRefresh();
    }

    function clearAll() {
        var total = getTotalGroups();
        if (total === 0) return;
        var allSelected = getAllSelectedGroups(); // capture before clearing
        var cats = Object.keys(state.selectedGroups);
        for (var i = 0; i < cats.length; i++) state.selectedGroups[cats[i]].clear();
        state.shuffled = false;
        // Update all previously selected cards to unselected state
        for (var j = 0; j < allSelected.length; j++) {
            patchCardVisual(allSelected[j].category, allSelected[j].id);
        }
        // Force clear the prompt output and reset custom edit flag
        lastAutoPrompt = '';
        promptIsCustom = false;
        dom.promptOutput.value = '';
        dom.charCount.textContent = '0 ' + t('badge_chars');
        lightRefresh();
    }

    async function handleCopy() {
        var prompt = dom.promptOutput.value; if (!prompt) return;
        try { await copyToClipboard(prompt); dom.copyBtn.classList.add('copy-pulse-v10'); setTimeout(function(){dom.copyBtn.classList.remove('copy-pulse-v10');},700); } catch(e) {}
    }

    function handleShuffle() { if (getTotalGroups() === 0) return; state.shuffled = true; renderPrompt(true, true); }

    function toggleMode(mode) { if (state.mode === mode) return; state.mode = mode; renderPrompt(state.shuffled, true); updateModeUI(); saveState(); }

    function switchLang(lang) { if (state.lang === lang) return; state.lang = lang; document.documentElement.lang = lang==='zh-TW'?'zh-TW':lang==='en'?'en':'zh-CN'; refreshUI(); }

    // ==================== Scroll Spy for Sidebar ====================
    var scrollSpyTimeout;
    dom.mainContent.addEventListener('scroll', function() {
        if (scrollSpyTimeout) clearTimeout(scrollSpyTimeout);
        scrollSpyTimeout = setTimeout(function() {
            var order = state.nsfwEnabled ? ALL_ORDER : SAFE_ORDER;
            var scrollTop = dom.mainContent.scrollTop + 120;
            var currentCat = order[0];
            for (var i = 0; i < order.length; i++) {
                var section = document.querySelector('[data-cat-section="' + order[i] + '"]');
                if (section && section.offsetTop <= scrollTop) currentCat = order[i];
            }
            if (state.activeCategory !== currentCat) {
                state.activeCategory = currentCat;
                renderSidebar();
                saveState();
            }
        }, 100);
    });

    // ==================== Event Binding ====================
    function bindGlobalEvents() {
        // Selected chips container - remove buttons (event delegation, survives innerHTML changes)
        dom.selectedGroupsContainer.addEventListener('click', function(e) {
            var btn = e.target.closest('.remove-chip-btn-v10');
            if (!btn) return; e.stopPropagation();
            var cat = btn.dataset.cat, id = parseInt(btn.dataset.id, 10);
            if (cat && id) removeGroup(cat, id);
        });

        dom.clearAllBtn.addEventListener('click', function(e) { e.stopPropagation(); clearAll(); });
        dom.copyBtn.addEventListener('click', handleCopy);
        dom.shuffleBtn.addEventListener('click', handleShuffle);

        dom.modeToggle.addEventListener('click', function(e) {
            var opt = e.target.closest('.mode-option'); if (!opt) return; toggleMode(opt.dataset.mode);
        });

        var langBtns = $$('.lang-btn');
        langBtns.forEach(function(btn) { btn.addEventListener('click', function() { switchLang(this.dataset.lang); }); });

        dom.nsfwBtn.addEventListener('click', handleNsfwToggle);
        dom.nsfwModalCancel.addEventListener('click', closeNsfwModal);
        dom.nsfwModalConfirm.addEventListener('click', confirmNsfw);
        dom.nsfwModal.addEventListener('click', function(e) { if (e.target === dom.nsfwModal) closeNsfwModal(); });

        // Settings
        dom.settingsBtn.addEventListener('click', openSettings);
        dom.settingsCloseBtn.addEventListener('click', closeSettings);
        dom.settingsBackdrop.addEventListener('click', closeSettings);

        dom.blurSlider.addEventListener('input', function() {
            state.blurIntensity = parseInt(this.value, 10);
            applyBlurIntensity(); saveState();
        });

        dom.shimmerToggle.addEventListener('click', function() {
            state.shimmerEnabled = !state.shimmerEnabled;
            applyShimmer(); saveState();
        });

        // Search
        dom.searchInput.addEventListener('input', handleSearchInput);
        dom.searchClearBtn.addEventListener('click', clearSearch);

        // ========== Prompt textarea: allow direct editing + protect from auto-overwrite ==========
        // Live char count + detect manual customization (guard in renderPrompt)
        dom.promptOutput.addEventListener('input', function() {
            dom.charCount.textContent = this.value.length + ' ' + t('badge_chars');
            promptIsCustom = (this.value !== lastAutoPrompt);
            updateRegenBtn();
        });

        // Explicit "refresh from selections" button — forces overwrite even if customized
        if (dom.regenPromptBtn) {
            dom.regenPromptBtn.addEventListener('click', function() {
                renderPrompt(state.shuffled, true);
            });
        }
    }

    // ==================== Init ====================
    function init() {
        loadState();
        document.documentElement.lang = state.lang === 'zh-TW' ? 'zh-TW' : state.lang === 'en' ? 'en' : 'zh-CN';
        renderSidebar();
        renderMainContent();
        renderSelectedGroups();
        renderPrompt(state.shuffled);
        updateStaticTexts();
        updateModeUI();
        updateLangButtons();
        updateNsfwButton();
        applySettings();
        dom.searchInput.placeholder = t('search_placeholder');
        bindGlobalEvents();

        if (getTotalGroups() === 0) {
            dom.emptyHintRight.classList.remove('hidden'); dom.clearAllBtn.classList.add('hidden');
        }
    }

    init();
})();
</script>
</body>
</html>
